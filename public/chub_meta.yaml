# Multi-purpose Stage for Jens
project_name: "Jens Slowburn Tools"
tagline: "Console + Choices + POV for tension RP"
position: "ADJACENT"
visibility: "PUBLIC"
tags:
  - Tension
  - POV
  - Console
config_schema:
  type: object
  properties:
    consolePassword:
      type: string
      default: "tension"
    defaultPOV:
      type: string
      default: "male"
state_schema:
  message:
    type: object
    properties:
      tension: {type: "number", default: 30}
      risk: {type: "number", default: 15}
      currentPOV: {type: "string", default: "male"}
      consoleOpen: {type: "boolean", default: false}